<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .section {
      background: white;
      padding: 15px;
      margin: 20px auto;
      width: 600px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    button {
      margin: 5px;
      padding: 6px 10px;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    li {
      margin-bottom: 10px;
    }

    .tags {
      color: green;
      font-size: 12px;
    }

    .comments {
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h1>🚀 Admin Dashboard</h1>

<div class="section">
  <h2>📋 Tasks</h2>
  <button onclick="loadTasks()">Carregar</button>
  <button onclick="createTaskUI()">Criar</button>
  <ul id="taskList"></ul>
</div>

<div class="section">
  <h2>👤 Users</h2>
  <button onclick="loadUsers()">Carregar</button>
  <button onclick="createUserUI()">Criar</button>
  <ul id="userList"></ul>
</div>

<div class="section">
  <h2>🏷️ Tags</h2>
  <button onclick="loadTags()">Carregar</button>
  <button onclick="createTagUI()">Criar</button>
  <ul id="tagList"></ul>
</div>

<script type="module" src="./dist/main.js"></script>

</body>
</html>
